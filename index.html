<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation 3D - Génération Procédurale & Texture Ouattée</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Import Three.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <!-- Import OrbitControls for camera interaction -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Animation 3D Procédurale</h1>
            <p class="subtitle">Génération de terrain & Texture Ouattée avec Three.js</p>
        </header>
        
        <div class="info-panel">
            <div class="info-item">
                <span class="label">Type:</span>
                <span class="value">Terrain Procédural + Nuages Ouattés</span>
            </div>
            <div class="info-item">
                <span class="label">Technologie:</span>
                <span class="value">Three.js + Perlin/Simplex Noise</span>
            </div>
            <div class="info-item">
                <span class="label">Contrôles:</span>
                <span class="value">Souris (rotation), Molette (zoom)</span>
            </div>
        </div>
        
        <!-- Container for Three.js canvas -->
        <div id="scene-container"></div>
        
        <div class="controls">
            <button id="regenerate-btn" class="btn">↻ Régénérer</button>
            <button id="animate-btn" class="btn">⏸️ Pause/Play</button>
            <div class="slider-container">
                <label for="scale-slider">Échelle du terrain:</label>
                <input type="range" id="scale-slider" min="10" max="200" value="50">
            </div>
            <div class="slider-container">
                <label for="speed-slider">Vitesse:</label>
                <input type="range" id="speed-slider" min="0.1" max="2" value="1" step="0.1">
            </div>
        </div>
    </div>
    
    <!-- Main Three.js script -->
    <script src="script.js"></script>
</body>
</html>
